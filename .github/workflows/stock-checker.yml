name: Amul Lassi Stock Checker

on:
  schedule:
    - cron: '*/10 * * * *'   # Runs every 10 minutes, 24/7
  workflow_dispatch:           # Also allows manual runs from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-0 libnss3 libnspr4 libdbus-1-3 \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 \
            libpango-1.0-0 libcairo2 libatspi2.0-0

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install chromium

      - name: Run stock checker
        run: python amul_stock_checker.py
        env:
          SUCHIT_TOKEN: ${{ secrets.SUCHIT_TOKEN }}
          SUCHIT_CHAT_ID: ${{ secrets.SUCHIT_CHAT_ID }}
          SUYASH_TOKEN: ${{ secrets.SUYASH_TOKEN }}
          SUYASH_CHAT_ID: ${{ secrets.SUYASH_CHAT_ID }}
